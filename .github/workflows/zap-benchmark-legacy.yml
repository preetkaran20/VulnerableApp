name: ZAP Benchmark Legacy

on:
  # Run weekly every Monday at 01:00 UTC
  schedule:
    - cron: '0 1 * * 1'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zap-benchmark:
    name: Run ZAP DAST Benchmark Legacy
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repo
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------
      # 2. Start VulnerableApp
      # ------------------------------------------------------------------
      - name: Start VulnerableApp
        run: |
          docker compose -f docker-compose.without_llm.yml up -d
          echo "Waiting for stack to be ready..."
          sleep 60

      - name: Verify VulnerableApp is up
        run: |
          curl -f --retry 15 --retry-delay 10 --retry-connrefused \
            http://localhost/VulnerableApp/scanner | python3 -m json.tool | head -5

      # ------------------------------------------------------------------
      # 3. Run ZAP scan - Legacy UI
      #
      # FIX 1: Network — use Compose project name to get the default
      #         network reliably instead of `head -1` on an arbitrary
      #         container (order is non-deterministic).
      #
      # FIX 2: Image — use `stable` tag; the plain version tag does NOT
      #         bundle a browser, so Ajax Spider finishes in 0s with 0 URLs.
      #         `stable` includes Firefox which ZAP can drive headlessly.
      #
      # FIX 3: Add --cap-add=SYS_ADMIN so Firefox's sandbox works inside
      #         Docker on the GitHub Actions runner.
      #
      # FIX 4: Single zap.sh invocation with -addonupdate -addoninstallall
      #         before -cmd -autorun so add-ons are active in the same
      #         process that runs the automation plan.
      # ------------------------------------------------------------------
      - name: Run ZAP Scan (Legacy UI)
        run: |
          PROJECT_NAME=$(basename "$PWD" | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]-_')
          NETWORK="${PROJECT_NAME}_default"

          if ! docker network inspect "$NETWORK" > /dev/null 2>&1; then
            echo "Network $NETWORK not found, falling back to container inspection..."
            CONTAINER_ID=$(docker compose -f docker-compose.without_llm.yml ps -q | head -1)
            NETWORK=$(docker inspect "$CONTAINER_ID" \
              --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' \
              | awk '{print $1}')
          fi

          echo "Using network: $NETWORK"

          docker run \
            --network "$NETWORK" \
            --shm-size=2g \
            --cap-add=SYS_ADMIN \
            --user root \
            -v "$(pwd)/benchmarks/ZAP:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -addonupdate \
                   -addoninstallall \
                   -cmd -autorun /zap/wrk/zap-automation-legacy.yaml

      - name: Verify Legacy UI ZAP report
        run: |
          ls -lh benchmarks/ZAP/zap-raw-report-legacy.json
          python3 -c "
          import json
          with open('benchmarks/ZAP/zap-raw-report-legacy.json') as f:
              data = json.load(f)
          if isinstance(data, list):
              sites = data
          else:
              sites = data.get('site', [])
          if isinstance(sites, dict):
              sites = [sites]
          total = sum(len(s.get('alerts',[])) for s in sites)
          print(f'  Legacy UI alerts found: {total}')
          assert total > 0, 'ZAP produced zero alerts — Ajax Spider likely has no browser'
          "

      # ------------------------------------------------------------------
      # 4. Convert ZAP report to benchmark input format
      # ------------------------------------------------------------------
      - name: Convert Legacy UI ZAP report
        run: |
          python3 benchmarks/ZAP/scripts/convert_zap_to_benchmark.py \
            --input  benchmarks/ZAP/zap-raw-report-legacy.json \
            --output benchmarks/ZAP/zap-benchmark-input-legacy.json
          echo "Legacy UI findings:"
          python3 -c "
          import json
          with open('benchmarks/ZAP/zap-benchmark-input-legacy.json') as f:
              data = json.load(f)
          print(f'  Total: {len(data[\"findings\"])}')
          "

      # ------------------------------------------------------------------
      # 5. Submit to benchmark endpoint and save results
      # ------------------------------------------------------------------
      - name: Run benchmark (Legacy UI)
        run: |
          curl -s -X POST http://localhost/VulnerableApp/scanner/benchmark \
            -H "Content-Type: application/json" \
            -d @benchmarks/ZAP/zap-benchmark-input-legacy.json \
            -o benchmarks/ZAP/zap-results-legacy.json
          echo "=== Legacy UI Benchmark Results ==="
          python3 -c "
          import json
          with open('benchmarks/ZAP/zap-results-legacy.json') as f:
              data = json.load(f)
          print(f'  Tool:           {data[\"tool\"]}')
          print(f'  Coverage:       {data[\"coverage\"]:.2f}%')
          print(f'  Total Expected: {data[\"totalExpected\"]}')
          print(f'  Detected:       {data[\"detected\"]}')
          print(f'  Missed:         {data[\"missed\"]}')
          print(f'  Unmatched:      {data[\"unmatched\"]}')
          "

      # ------------------------------------------------------------------
      # 6. Update benchmark_results.md with real numbers
      #
      # FIX: Removed dependency on zap-results.json (modern workflow output).
      #      The legacy workflow only updates legacy rows so it can run
      #      standalone without a FileNotFoundError.
      # ------------------------------------------------------------------
      - name: Update benchmark results doc
        run: |
          python3 - << 'PYEOF'
          import json, re
          from datetime import date

          with open('benchmarks/ZAP/zap-results-legacy.json') as f:
              legacy = json.load(f)

          with open('benchmarks/ZAP/benchmark_results.md') as f:
              content = f.read()

          replacements = {
              r'\| \*\*Detected by ZAP \(Legacy UI\)\*\* \| .* \|':
                  f'| **Detected by ZAP (Legacy UI)** | **{legacy["detected"]}** |',
              r'\| Missed \(Legacy UI\) \| .* \|':
                  f'| Missed (Legacy UI) | {legacy["missed"]} |',
              r'\| \*\*Coverage \(Legacy UI\)\*\* \| .* \|':
                  f'| **Coverage (Legacy UI)** | **{legacy["coverage"]:.2f}%** |',
              r'\| Unmatched \(Legacy UI\) \| .* \|':
                  f'| Unmatched (Legacy UI) | {legacy["unmatched"]} |',
              r'\| Date \| .* \|':
                  f'| Date | {date.today().isoformat()} |',
          }

          for pattern, replacement in replacements.items():
              content = re.sub(pattern, replacement, content)

          with open('benchmarks/ZAP/benchmark_results.md', 'w') as f:
              f.write(content)

          print("benchmark_results.md updated (legacy rows only)")
          PYEOF

      # ------------------------------------------------------------------
      # 7. Commit and push results back to repo
      # ------------------------------------------------------------------
      - name: Commit benchmark results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add \
            benchmarks/ZAP/zap-results-legacy.json \
            benchmarks/ZAP/benchmark_results.md
          git diff --staged --quiet || git commit -m \
            "chore: update ZAP benchmark results [$(date -u '+%Y-%m-%d')]"
          git push

      # ------------------------------------------------------------------
      # 8. Upload raw report and input as artifacts (for inspection)
      # ------------------------------------------------------------------
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-benchmark-artifacts-legacy
          path: |
            benchmarks/ZAP/zap-raw-report-legacy.json
            benchmarks/ZAP/zap-benchmark-input-legacy.json
            benchmarks/ZAP/zap-results-legacy.json
            benchmarks/ZAP/benchmark_results.md
          retention-days: 90
