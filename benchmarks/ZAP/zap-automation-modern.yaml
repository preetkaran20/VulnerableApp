---
# ---------------------------------------------------------------------------
# ZAP by Checkmarx Automation Framework Plan
# Scans VulnerableApp modern UI and writes a JSON report consumed by the benchmark.
#
# Usage:
#     NETWORK=$(docker inspect $(docker compose -f docker-compose.without_llm.yml ps -q | head -1) \
#       --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}')
#     docker run --network "$NETWORK" \
#       --shm-size=8g \
#       -v "$(pwd)/benchmarks/ZAP:/zap/wrk/:rw" \
#       ghcr.io/zaproxy/zaproxy:weekly \
#       bash -c "
#         zap.sh -cmd \
#           -addonupdate \
#           -addoninstallall \
#           -autorun /zap/wrk/zap-automation-modern.yaml
#       "
#
# The JSON report is written to benchmarks/ZAP/zap-raw-report.json.
# Run convert_zap_to_benchmark.py afterwards to produce the benchmark input.
# ---------------------------------------------------------------------------

env:
  contexts:
    - name: VulnerableApp-modern
      urls:
        - http://VulnerableApp-facade
      includePaths:
        - "http://VulnerableApp-facade.*"
        - "http://VulnerableApp-facade/VulnerableApp.*"

  parameters:
    failOnError: false
    failOnWarning: false
    progressToStdout: true
    
jobs:         
  # ------------------------------------------------------------------
  # 1. Spider — crawl VulnerableApp to discover all endpoints
  # ------------------------------------------------------------------
  - type: spider
    parameters:
      context: VulnerableApp-modern
      url: http://VulnerableApp-facade
      maxDuration: 20         # minutes
      maxDepth: 500
      acceptCookies: true

  - type: spiderClient
    parameters:
      context: VulnerableApp-modern
      url: http://VulnerableApp-facade
      maxDuration: 120
      maxCrawlDepth: 0
      maxChildren: 100
      numberOfBrowsers: 15
      browserId: firefox-headless
      initialLoadTime: 10
      pageLoadTime: 4
      actionWaitTime: 2
      shutdownTime: 60
      scopeCheck: Flexible

  # ------------------------------------------------------------------
  # 2. Ajax Spider — picks up JS-rendered pages the traditional spider misses
  # ------------------------------------------------------------------
  - type: spiderAjax
    parameters:
      context: VulnerableApp-modern
      url: http://VulnerableApp-facade
      maxDuration: 240         # minutes
      maxCrawlDepth: 400
      maxCrawlStates: 0        # unlimited
      numberOfBrowsers: 18
      reloadWait: 8000
      eventWait: 2500
      browserId: firefox-headless
      clickDefaultElems: true
      clickElemsOnce: false
      randomInputs: true
      enableExtensions: true
      elements:
      - "a"
      - "button"
      - "input"
      - "select"
      - "option"
      - "textarea"
      - "form"
      - "label"
      - "fieldset"
      - "legend"
      - "datalist"
      - "output"      
      - "li"
      - "ul"
      - "ol"
      - "menu"
      - "menuitem"
      - "table"
      - "thead"
      - "tbody"
      - "tfoot"
      - "tr"
      - "td"
      - "th"
      - "caption"
      - "img"
      - "svg"
      - "canvas"
      - "video"
      - "audio"
      - "source"
      - "div"
      - "span"
      - "section"
      - "article"
      - "nav"
      - "header"
      - "footer"
      - "main"
      - "aside"
      - "details"
      - "summary"
      - "dialog"
      - "p"

  # ------------------------------------------------------------------
  # 3. Passive Scan Wait — wait for passive scan to complete before active scan
  # ------------------------------------------------------------------ 

  - type: passiveScan-wait
    parameters:
      maxDuration: 20
      
  - type: activeScan-config
    parameters: {}
    inputVectors:
      urlQueryStringAndDataDrivenNodes:
        enabled: true
        addParam: true
        odata: true
      postData:
        enabled: true
        multiPartFormData: true
        xml: true
        json:
          enabled: true
          scanNullValues: true
        googleWebToolkit: true
        directWebRemoting: true
      urlPath: true
      httpHeaders:
        enabled: true
        allRequests: true
      cookieData:
        enabled: true
        encodeCookieValues: true
      scripts: true
  # ------------------------------------------------------------------
  # 4. Active Scan — attack mode against discovered URLs
  # ------------------------------------------------------------------
  - type: activeScan
    parameters:
      context: VulnerableApp-modern
      maxRuleDurationInMins: 15
      maxScanDurationInMins: 360
      addQueryParam: true
      injectPluginIdInHeader: true
      scanHeadersAllRequests: true
    policyDefinition:
      defaultStrength: insane
      defaultThreshold: low
    rules:
      - id: 10095
        name: Backup File Disclosure
        threshold: OFF

  # ------------------------------------------------------------------
  # 5. Report — JSON format, written to benchmarks/zap-raw-report.json
  # ------------------------------------------------------------------
  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-raw-report
      reportTitle: VulnerableApp ZAP Scan (Modern UI)
      reportDescription: "DAST scan of OWASP VulnerableApp modern UI for benchmark evaluation"
    risks:
      - high
      - medium
      - low
