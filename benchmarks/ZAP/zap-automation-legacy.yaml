---
# ---------------------------------------------------------------------------
# ZAP by Checkmarx Automation Framework Plan
# Scans VulnerableApp legacy UI and writes a JSON report consumed by the
# benchmark.
#
# Usage (from repo root):
#     PROJECT_NAME=$(basename "$PWD" | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]-_')
#     NETWORK="${PROJECT_NAME}_default"
#     docker run \
#       --network "$NETWORK" \
#       --shm-size=2g \
#       --cap-add=SYS_ADMIN \
#       --user root \
#       -v "$(pwd)/benchmarks/ZAP:/zap/wrk/:rw" \
#       ghcr.io/zaproxy/zaproxy:stable \
#       zap.sh -addonupdate -addoninstallall -cmd -autorun /zap/wrk/zap-automation-legacy.yaml
#
# The JSON report is written to benchmarks/ZAP/zap-raw-report-legacy.json.
# Run convert_zap_to_benchmark.py afterwards to produce the benchmark input.
# ---------------------------------------------------------------------------

env:
  contexts:
    - name: VulnerableApp-legacy
      urls:
        - http://VulnerableApp-facade/VulnerableApp
      includePaths:
        - "http://.*"

parameters:
  failOnError: false
  failOnWarning: false
  progressToStdout: true

jobs:
  # ------------------------------------------------------------------
  # 1. Spider — crawl VulnerableApp legacy endpoints
  # ------------------------------------------------------------------
  - type: spider
    parameters:
      context: VulnerableApp-legacy
      url: http://VulnerableApp-facade/VulnerableApp
      maxDuration: 20       # minutes
      maxDepth: 100
      acceptCookies: true

  # ------------------------------------------------------------------
  # 2. Ajax Spider — picks up JS-rendered pages the traditional spider misses
  #
  # FIX: chrome-headless → firefox-headless
  # Chrome is not bundled in ghcr.io/zaproxy/zaproxy:stable.
  # Firefox is. Using chrome-headless causes Ajax Spider to launch,
  # find no binary, and exit instantly with 0 URLs found.
  # ------------------------------------------------------------------
  - type: spiderAjax
    parameters:
      context: VulnerableApp-legacy
      url: http://VulnerableApp-facade/VulnerableApp
      maxDuration: 20       # minutes
      maxCrawlDepth: 20
      browserId: firefox-headless
      clickDefaultElems: true
      clickElemsOnce: true
      randomInputs: true

  # ------------------------------------------------------------------
  # 3. Passive scan wait — ensures all passive rules finish processing
  #    the full site tree before the active scan begins.
  #
  # FIX: This job was missing. Without it the active scan races against
  #    an incomplete passive scan and may start with a partial site tree.
  # ------------------------------------------------------------------
  - type: passiveScan-wait
    parameters:
      maxDuration: 10       # minutes

  # ------------------------------------------------------------------
  # 4. Active Scan — insane mode for maximum vulnerability coverage
  # ------------------------------------------------------------------
  - type: activeScan
    parameters:
      context: VulnerableApp-legacy
      maxRuleDurationInMins: 5
      maxScanDurationInMins: 120
    policyDefinition:
      defaultStrength: INSANE
      defaultThreshold: LOW

  # ------------------------------------------------------------------
  # 5. Report — JSON format, written to benchmarks/ZAP/zap-raw-report-legacy.json
  #
  # FIX: Added `informational` to risks. Missing-header and cookie alerts
  #    are informational and may be needed for benchmark matching.
  # ------------------------------------------------------------------
  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-raw-report-legacy
      reportTitle: VulnerableApp ZAP Scan (Legacy UI)
      reportDescription: "DAST scan of OWASP VulnerableApp legacy UI for benchmark evaluation"
    risks:
      - high
      - medium
      - low
